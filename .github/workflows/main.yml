name: Costruisci APK Kivy

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installa dipendenze di sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lldb lld cmake

      # Corretto: Il nome esatto del repository è ArtemSBulgakov
      - name: Compila APK con Buildozer Action
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer android release
          repository_root: .

      - name: Carica come artifact
        uses: actions/upload-artifact@v4
        with:
          name: rassegna-kivy-apk
          path: bin/*.apk
